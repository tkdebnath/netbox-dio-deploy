# Read the Docs configuration for NetBox Diode Device Wrapper
# Documentation: https://docs.readthedocs.io/

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

formats:
  - pdf
  - epub
  - htmlzip

python:
  install:
    - requirements: docs/requirements.txt

sphinx:
  configuration: docs/conf.py

# Optional: specify Python version and requirements
python:
  version: 3.11
  system_packages: false
  install:
    - requirements: docs/requirements.txt
  use_system_cache: true
